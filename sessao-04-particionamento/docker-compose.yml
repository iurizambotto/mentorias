# Nome do projeto Docker da sessao 04.
name: mentoria-sessao-04-particionamento

services:
  minio:
    # Storage S3-compatible para laboratorio de particoes.
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    # Nome explicito para facilitar troubleshooting.
    container_name: mentoria-s04-minio
    # Comando de inicializacao do servidor MinIO.
    command: server /data --console-address ":9001"
    # Credenciais de laboratorio (nao usar em producao).
    environment:
      # Usuario root do MinIO para acesso administrativo.
      MINIO_ROOT_USER: minioadmin
      # Senha root do MinIO para acesso administrativo.
      MINIO_ROOT_PASSWORD: minioadmin
    # Publica API S3 e console web.
    ports:
      # Porta S3 compativel.
      - "9000:9000"
      # Porta do console administrativo.
      - "9001:9001"
    # Persistencia dos objetos armazenados.
    volumes:
      # Volume nomeado para dados do MinIO.
      - minio-data:/data
    # Healthcheck nativo do MinIO via endpoint de saude.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Limite de CPU para manter previsibilidade em aula.
    cpus: "1.00"
    # Limite maximo de memoria para servico de storage.
    mem_limit: 1200m
    # Reserva minima para estabilidade de operacao.
    mem_reservation: 400m

  minio-init:
    # Cliente oficial para bootstrap de buckets.
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    # Nome explicito para inspecao dos logs de bootstrap.
    container_name: mentoria-s04-minio-init
    # Aguarda MinIO estar healthy antes de criar buckets.
    depends_on:
      minio:
        condition: service_healthy
    # Cria tres buckets independentes: bronze, silver e gold.
    # Cada camada do lakehouse vive em um bucket separado.
    entrypoint: >
      /bin/sh -c
      "mc alias set local http://minio:9000 minioadmin minioadmin &&
       mc mb --ignore-existing local/bronze &&
       mc mb --ignore-existing local/silver &&
       mc mb --ignore-existing local/gold"
    # Executa apenas para inicializacao e finaliza.
    restart: "no"

  metastore-db:
    # Banco relacional do Hive Metastore.
    image: postgres:16
    # Nome explicito para troubleshooting.
    container_name: mentoria-s04-metastore-db
    # Credenciais e banco para metastore.
    environment:
      # Usuario do metastore.
      POSTGRES_USER: hive
      # Senha do metastore.
      POSTGRES_PASSWORD: hive
      # Banco especifico do metastore.
      POSTGRES_DB: metastore
    # Persistencia do banco de metadados.
    volumes:
      # Volume nomeado do PostgreSQL do metastore.
      - s04-metastore-db:/var/lib/postgresql/data
    # Porta publicada para debug opcional local.
    ports:
      # Porta alternativa para nao conflitar com outros postgres.
      - "55434:5432"
    # Healthcheck nativo do postgres para ordenacao de dependencias.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Limite de CPU para o banco.
    cpus: "0.75"
    # Limite de memoria para metastore DB.
    mem_limit: 900m
    # Reserva minima de memoria.
    mem_reservation: 350m

  hive-jdbc-init:
    # Init-container: baixa o driver JDBC do PostgreSQL para volume compartilhado.
    # A imagem apache/hive:4.0.0 nao inclui o driver por padrao.
    # Usamos a imagem debian:slim que tem wget disponivel.
    image: debian:bookworm-slim
    container_name: mentoria-s04-hive-jdbc-init
    # Baixa o JAR JDBC e salva no volume compartilhado.
    command: >-
      bash -c "apt-get update -qq && apt-get install -y -qq wget && wget -q https://jdbc.postgresql.org/download/postgresql-42.7.3.jar -O /jdbc/postgresql-42.7.3.jar && echo JDBC OK"
    volumes:
      # Volume compartilhado onde o JAR sera copiado.
      - hive-jdbc:/jdbc
    # Executa apenas uma vez na inicializacao.
    restart: "no"

  hive-metastore:
    # Imagem Apache Hive para rodar servico metastore.
    image: apache/hive:4.0.0
    # Nome explicito para diagnostico de metadados.
    container_name: mentoria-s04-hive-metastore
    # Variavel DB_DRIVER instrui o entrypoint nativo a usar postgres.
    environment:
      # Servico alvo: metastore.
      SERVICE_NAME: metastore
      # Driver de banco: postgres (lido pelo entrypoint nativo da imagem).
      DB_DRIVER: postgres
      # Aponta para diretorio de conf customizado montado via volume.
      HIVE_CUSTOM_CONF_DIR: /hive-custom-conf
      # Opcoes JVM para o metastore apontar para PostgreSQL.
      SERVICE_OPTS: "-Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=hive"
      # Instrui o Hive a incluir o JDBC do PostgreSQL e o driver S3A no classpath.
      # hadoop-aws e aws-java-sdk-bundle ja existem na imagem em tools/lib/
      # mas nao sao carregados por padrao - HIVE_AUX_JARS_PATH os adiciona ao classpath.
      HIVE_AUX_JARS_PATH: "/opt/hive/aux/postgresql-42.7.3.jar,/opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar,/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar"
    # Publica porta Thrift do metastore.
    ports:
      # Porta padrao do Hive Metastore.
      - "9083:9083"
    volumes:
      # Arquivo hive-site.xml customizado com configuracoes de PostgreSQL e MinIO.
      - ./hive/conf:/hive-custom-conf:ro
      # Volume com o JAR JDBC do PostgreSQL baixado pelo init-container (pasta aux).
      - hive-jdbc:/opt/hive/aux
    # Aguarda banco do metastore e o init do JDBC estarem prontos.
    depends_on:
      metastore-db:
        condition: service_healthy
      hive-jdbc-init:
        condition: service_completed_successfully
    # Limite de CPU para processo Java do metastore.
    cpus: "1.00"
    # Limite maximo de memoria para metastore.
    mem_limit: 1600m
    # Reserva minima para reduzir risco de OOM.
    mem_reservation: 700m

  trino:
    # Engine de consulta SQL para analisar tabelas particionadas.
    image: trinodb/trino:479
    # Nome explicito para troubleshooting das queries.
    container_name: mentoria-s04-trino
    # Publica Trino em porta nao conflitante com Airflow (8080) e outras sessoes.
    ports:
      # Mapeia porta local 8090 para porta interna 8080.
      - "8090:8080"
    # Monta catalogo Hive com configuracao de MinIO e Metastore.
    volumes:
      # Arquivo de catalogo Hive para Trino.
      - ./trino/catalog/hive.properties:/etc/trino/catalog/hive.properties
    # Espera servicos de metadata e storage subirem.
    depends_on:
      - hive-metastore
      - minio
    # Limite de CPU do coordenador Trino.
    cpus: "2.00"
    # Limite maximo de memoria do Trino.
    mem_limit: 3g
    # Reserva minima de memoria do Trino.
    mem_reservation: 1200m

volumes:
  # Persistencia do storage object do MinIO.
  minio-data:
  # Persistencia do PostgreSQL do metastore.
  s04-metastore-db:
  # Volume compartilhado para o JAR JDBC do PostgreSQL.
  hive-jdbc:
