# Conector Hive para consultas no cenário completo.
connector.name=hive
# Endpoint thrift do metastore da sessão 10.
hive.metastore.uri=thrift://hive-metastore:9083
# Endpoint S3-compatible do MinIO da sessão 10.
hive.s3.endpoint=http://minio:9000
# Acesso path-style necessário para MinIO.
hive.s3.path-style-access=true
# Credencial de acesso ao MinIO.
hive.s3.aws-access-key=minioadmin
# Segredo de acesso ao MinIO.
hive.s3.aws-secret-key=minioadmin
# SSL desativado para ambiente local.
hive.s3.ssl.enabled=false
