# Configuração mínima do Loki para o cenário E2E.
auth_enabled: false

server:
  # Porta HTTP do Loki.
  http_listen_port: 3100

common:
  # Prefixo de armazenamento local de índices e chunks.
  path_prefix: /tmp/loki
  storage:
    filesystem:
      # Diretório de chunks.
      chunks_directory: /tmp/loki/chunks
      # Diretório de regras.
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2025-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Permite metadados estruturados em logs do laboratório.
  allow_structured_metadata: true
