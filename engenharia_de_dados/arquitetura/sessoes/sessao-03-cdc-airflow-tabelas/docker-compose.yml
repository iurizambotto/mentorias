# Nome do projeto Docker para a sessão 03.
name: mentoria-sessao-03-cdc

services:
  cdc-lab:
    # Imagem leve com Python para executar scripts de CDC/datasets.
    image: python:3.12-slim
    # Nome explícito para facilitar inspeção de logs.
    container_name: mentoria-s03-cdc-lab
    # Diretório de trabalho dentro do container.
    working_dir: /workspace
    # Monta o projeto completo para ler scripts e artefatos.
    volumes:
      # Caminho relativo até a raiz do projeto zambotto-mentoria.
      - ../../:/workspace
    # Mantém o container ativo para execução manual de comandos.
    command: ["sleep", "infinity"]
    # Perfil opcional para não subir por padrão.
    profiles: ["lab"]
    # Limite de CPU para evitar consumo excessivo em aula.
    cpus: "1.00"
    # Limite máximo de memória para execução dos exemplos.
    mem_limit: 900m
    # Reserva mínima para manter estabilidade em exportações.
    mem_reservation: 300m
