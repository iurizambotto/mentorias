# Nome do projeto Docker da sessão 09.
name: mentoria-sessao-09-plataforma-marketing

services:
  marketing-lab:
    # Container auxiliar para executar validações ponta a ponta do domínio marketing.
    image: python:3.12-slim
    # Nome explícito para troubleshooting.
    container_name: mentoria-s09-marketing-lab
    # Diretório de trabalho dentro do container.
    working_dir: /workspace
    # Monta projeto completo para scripts e documentação.
    volumes:
      # Montagem da raiz do projeto para execução de comandos.
      - ../../:/workspace
    # Mantém container ativo para execução manual de testes.
    command: ["sleep", "infinity"]
    # Limite de CPU do laboratório.
    cpus: "1.00"
    # Limite de memória do laboratório.
    mem_limit: 1000m
    # Reserva mínima do laboratório.
    mem_reservation: 300m
