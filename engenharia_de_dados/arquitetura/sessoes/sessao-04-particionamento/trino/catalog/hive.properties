# Conector Hive para leitura e escrita de tabelas no Trino 479.
# Trino 479 usa o sistema de arquivos nativo S3 (fs.native-s3.enabled).
# As propriedades legadas hive.s3.* foram removidas nesta versao.
connector.name=hive
# URI Thrift do Hive Metastore da sessao.
hive.metastore.uri=thrift://hive-metastore:9083
# Ativa o sistema de arquivos nativo S3 (obrigatorio no Trino 479+).
fs.native-s3.enabled=true
# Endpoint S3-compatible apontando para o MinIO da sessao.
s3.endpoint=http://minio:9000
# Regiao dummy necessaria para o AWS SDK (MinIO ignora, mas o SDK exige o campo).
s3.region=us-east-1
# Acesso path-style necessario para MinIO.
s3.path-style-access=true
# Credencial de acesso ao MinIO para o conector.
s3.aws-access-key=minioadmin
# Segredo de acesso ao MinIO para o conector.
s3.aws-secret-key=minioadmin
# Permite escrita em tabelas externas (necessario para CREATE TABLE no lab).
hive.non-managed-table-writes-enabled=true
