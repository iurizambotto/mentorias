# Nome do projeto Docker da sessão 08.
name: mentoria-sessao-08-nosql-governanca

services:
  mongodb:
    # Banco NoSQL principal para exemplos de modelagem documento.
    image: mongo:7
    # Nome explícito para troubleshooting.
    container_name: mentoria-s08-mongodb
    # Publica porta padrão para conexões locais.
    ports:
      # Porta padrão do MongoDB.
      - "27017:27017"
    # Persistência de dados NoSQL.
    volumes:
      # Volume dedicado para dados do MongoDB.
      - s08-mongo-data:/data/db
    # Limite de CPU do MongoDB.
    cpus: "1.00"
    # Limite de memória do MongoDB.
    mem_limit: 1200m
    # Reserva mínima do MongoDB.
    mem_reservation: 400m

  redis:
    # Redis complementar para cache/fila em cenários de governança.
    image: redis:7.2-bookworm
    # Nome explícito para troubleshooting.
    container_name: mentoria-s08-redis
    # Publica porta padrão para exemplos de integração.
    ports:
      # Porta padrão do Redis.
      - "6379:6379"
    # Limite de CPU do Redis.
    cpus: "0.50"
    # Limite de memória do Redis.
    mem_limit: 500m
    # Reserva mínima do Redis.
    mem_reservation: 200m

  openmetadata-postgresql:
    # Banco transacional do OpenMetadata.
    image: docker.getcollate.io/openmetadata/postgresql:1.12.0
    # Nome explícito para troubleshooting.
    container_name: mentoria-s08-openmetadata-postgresql
    # Credenciais do banco do OpenMetadata.
    environment:
      # Usuário administrativo do PostgreSQL interno.
      POSTGRES_USER: postgres
      # Senha administrativa do PostgreSQL interno.
      POSTGRES_PASSWORD: password
    # Publica porta para diagnóstico opcional.
    ports:
      # Porta PostgreSQL mapeada localmente.
      - "55436:5432"
    # Persistência dos dados do OpenMetadata.
    volumes:
      # Volume dedicado ao banco do OpenMetadata.
      - s08-openmetadata-db:/var/lib/postgresql/data
    # Limite de CPU do banco.
    cpus: "1.00"
    # Limite de memória do banco.
    mem_limit: 1300m
    # Reserva mínima do banco.
    mem_reservation: 500m

  openmetadata-elasticsearch:
    # Indexador de busca usado pelo OpenMetadata.
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    # Nome explícito para troubleshooting.
    container_name: mentoria-s08-openmetadata-elasticsearch
    # Configuração mínima para modo standalone local.
    environment:
      # Modo single-node para laboratório.
      discovery.type: single-node
      # Heap controlada para evitar consumo excessivo.
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      # Segurança desativada apenas para ambiente local.
      xpack.security.enabled: "false"
    # Publica endpoint de busca para validações.
    ports:
      # Porta HTTP do Elasticsearch.
      - "9200:9200"
    # Persistência de índices locais.
    volumes:
      # Volume dedicado para dados de índice.
      - s08-openmetadata-es:/usr/share/elasticsearch/data
    # Limite de CPU do Elasticsearch.
    cpus: "1.50"
    # Limite de memória do Elasticsearch.
    mem_limit: 2g
    # Reserva mínima do Elasticsearch.
    mem_reservation: 900m

  openmetadata-server:
    # Serviço principal de catálogo e governança.
    image: docker.getcollate.io/openmetadata/server:1.12.0
    # Nome explícito para troubleshooting.
    container_name: mentoria-s08-openmetadata-server
    # Configuração essencial para startup local.
    environment:
      # Nome lógico do cluster local.
      OPENMETADATA_CLUSTER_NAME: openmetadata
      # Porta HTTP da API/UI.
      SERVER_PORT: 8585
      # Porta administrativa interna.
      SERVER_ADMIN_PORT: 8586
      # Nível de log para leitura em aula.
      LOG_LEVEL: INFO
      # Driver JDBC do PostgreSQL.
      DB_DRIVER_CLASS: org.postgresql.Driver
      # Esquema do banco de metadados.
      DB_SCHEME: postgresql
      # Host do banco do OpenMetadata.
      DB_HOST: openmetadata-postgresql
      # Porta do banco do OpenMetadata.
      DB_PORT: 5432
      # Usuário da aplicação OpenMetadata.
      DB_USER: openmetadata_user
      # Senha da aplicação OpenMetadata.
      DB_USER_PASSWORD: openmetadata_password
      # Nome do banco principal do OpenMetadata.
      OM_DATABASE: openmetadata_db
      # Host do Elasticsearch interno.
      ELASTICSEARCH_HOST: openmetadata-elasticsearch
      # Porta do Elasticsearch interno.
      ELASTICSEARCH_PORT: 9200
      # Endpoint da API de ingestão.
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://openmetadata-ingestion:8080
      # Endpoint base da API para callbacks internos.
      SERVER_HOST_API_URL: http://openmetadata-server:8585/api
      # Usuário padrão do Airflow embarcado na ingestão.
      AIRFLOW_USERNAME: admin
      # Senha padrão do Airflow embarcado na ingestão.
      AIRFLOW_PASSWORD: admin
      # Gerenciador de segredos local no banco.
      SECRET_MANAGER: db
      # Autenticação básica para laboratório.
      AUTHENTICATION_PROVIDER: basic
      # Chave Fernet fixa para ambiente local de mentoria.
      FERNET_KEY: jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=
    # Publica UI e endpoint administrativo.
    ports:
      # Porta principal da UI/API do OpenMetadata.
      - "8585:8585"
      # Porta administrativa do OpenMetadata.
      - "8586:8586"
    # Dependências de banco e busca antes de subir servidor.
    depends_on:
      # Dependência do banco relacional.
      - openmetadata-postgresql
      # Dependência do indexador de busca.
      - openmetadata-elasticsearch
    # Limite de CPU do servidor de catálogo.
    cpus: "1.50"
    # Limite de memória do servidor.
    mem_limit: 2200m
    # Reserva mínima de memória do servidor.
    mem_reservation: 900m

  openmetadata-ingestion:
    # Serviço de ingestão/lineage do OpenMetadata.
    image: docker.getcollate.io/openmetadata/ingestion:1.12.0
    # Nome explícito para troubleshooting.
    container_name: mentoria-s08-openmetadata-ingestion
    # Variáveis de execução do Airflow interno de ingestão.
    environment:
      # Executor local para simplificar laboratório.
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Habilita backend de autenticação por sessão e basic auth.
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      # Host do banco de suporte ao Airflow da ingestão.
      DB_HOST: openmetadata-postgresql
      # Porta do banco de suporte.
      DB_PORT: 5432
      # Nome do banco de suporte ao Airflow.
      AIRFLOW_DB: airflow_db
      # Usuário do banco de suporte.
      DB_USER: airflow_user
      # Senha do banco de suporte.
      DB_PASSWORD: airflow_pass
      # Dialeto JDBC usado pela ingestão.
      DB_SCHEME: postgresql+psycopg2
    # Publica UI Airflow interno da ingestão em porta alternativa.
    ports:
      # Porta 8088 para evitar conflito com Airflow da sessão 02.
      - "8088:8080"
    # Dependência do servidor principal para integração completa.
    depends_on:
      # Servidor OpenMetadata deve estar disponível.
      - openmetadata-server
    # Limite de CPU da ingestão.
    cpus: "1.00"
    # Limite de memória da ingestão.
    mem_limit: 1500m
    # Reserva mínima da ingestão.
    mem_reservation: 600m

volumes:
  # Persistência de dados do MongoDB.
  s08-mongo-data:
  # Persistência do PostgreSQL do OpenMetadata.
  s08-openmetadata-db:
  # Persistência dos índices do Elasticsearch.
  s08-openmetadata-es:
